<div class="max-w-xl mx-auto space-y-5">

  <div class="flex items-center gap-3">
    <a routerLink="/payments" class="text-slate-400 hover:text-slate-600 transition-colors text-sm">← Retour</a>
    <h2 class="text-2xl font-bold text-slate-800">Enregistrer un paiement</h2>
  </div>

  <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

      <div>
        <label class="fp-label">ID de la facture *</label>
        <input type="text" formControlName="invoiceId" class="fp-input font-mono text-xs"
               placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
        <p class="text-xs text-slate-400 mt-1">Trouvez l'ID dans le détail de la facture</p>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="fp-label">Montant *</label>
          <div class="relative">
            <input type="number" formControlName="amount" class="fp-input pr-12"
                   placeholder="50000" min="0.01" step="0.01" />
            <span class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs font-medium">XOF</span>
          </div>
        </div>

        <div>
          <label class="fp-label">Date du paiement *</label>
          <input type="date" formControlName="paymentDate" class="fp-input" />
        </div>
      </div>

      <div>
        <label class="fp-label">Méthode de paiement *</label>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-2 mt-1">
          @for (method of paymentMethods; track method.value) {
            <label
              [class]="form.get('method')?.value === method.value
                ? 'border-blue-600 bg-blue-50 text-blue-700'
                : 'border-slate-200 bg-white text-slate-700 hover:border-slate-300'"
              class="flex items-center gap-2 p-2.5 rounded-lg border cursor-pointer transition-all text-sm font-medium"
            >
              <input type="radio" formControlName="method" [value]="method.value" class="sr-only" />
              <span class="text-base">{{ method.icon }}</span>
              <span>{{ method.label }}</span>
            </label>
          }
        </div>
      </div>

      <div>
        <label class="fp-label">Référence / N° de transaction</label>
        <input type="text" formControlName="reference" class="fp-input"
               placeholder="TXN-20240101-001" />
      </div>

      <div>
        <label class="fp-label">Notes</label>
        <textarea formControlName="notes" rows="2" class="fp-input resize-none"
                  placeholder="Informations complémentaires..."></textarea>
      </div>

      @if (error()) {
        <div class="flex items-center gap-2 text-sm text-red-700 bg-red-50 border border-red-200 px-4 py-3 rounded-lg">
          <span>⚠</span> {{ error() }}
        </div>
      }

      @if (success()) {
        <div class="flex items-center gap-2 text-sm text-green-700 bg-green-50 border border-green-200 px-4 py-3 rounded-lg">
          <span>✓</span> Paiement enregistré avec succès !
        </div>
      }

      <div class="flex gap-3 pt-2">
        <button
          type="submit"
          [disabled]="form.invalid || saving()"
          class="bg-blue-700 hover:bg-blue-800 disabled:bg-blue-300 disabled:cursor-not-allowed
                 text-white px-6 py-2.5 rounded-lg text-sm font-medium shadow-sm transition-colors"
        >
          @if (saving()) { Enregistrement... } @else { Enregistrer le paiement }
        </button>
        <a routerLink="/payments"
           class="px-6 py-2.5 rounded-lg text-sm font-medium border border-slate-300
                  hover:bg-slate-50 transition-colors text-slate-700">
          Annuler
        </a>
      </div>

    </form>
  </div>

</div>

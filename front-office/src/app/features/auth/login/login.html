<div class="min-h-screen bg-gradient-to-br from-blue-950 via-blue-900 to-blue-800
            flex items-center justify-center p-4">

  <!-- Background decoration -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 h-96 w-96 rounded-full bg-amber-400/5 blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 h-96 w-96 rounded-full bg-blue-400/5 blur-3xl"></div>
  </div>

  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex h-12 w-12 rounded-2xl bg-blue-900 items-center justify-center mb-3">
        <span class="text-amber-400 font-black text-base">FP</span>
      </div>
      <h1 class="text-2xl font-bold text-blue-900">
        <span class="text-amber-500">Facture</span>Pro Africa
      </h1>
      <p class="text-slate-400 mt-1 text-sm">Connectez-vous à votre espace</p>
    </div>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="vous@entreprise.com"
          class="w-full px-4 py-2.5 rounded-lg border border-slate-300
                 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition-shadow"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Mot de passe</label>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="w-full px-4 py-2.5 rounded-lg border border-slate-300
                 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition-shadow"
        />
      </div>

      @if (error()) {
        <div class="flex items-center gap-2 text-sm text-red-700 bg-red-50 border border-red-200 px-3 py-2.5 rounded-lg">
          <span>⚠</span> {{ error() }}
        </div>
      }

      <button
        type="submit"
        [disabled]="form.invalid || loading()"
        class="w-full bg-blue-700 hover:bg-blue-800 disabled:bg-blue-300 disabled:cursor-not-allowed
               text-white font-semibold py-2.5 rounded-lg text-sm shadow-sm transition-colors mt-2"
      >
        @if (loading()) {
          <span class="inline-flex items-center gap-2">
            <span class="h-3.5 w-3.5 rounded-full border-2 border-white/40 border-t-white animate-spin"></span>
            Connexion...
          </span>
        } @else {
          Se connecter
        }
      </button>
    </form>

    <p class="text-center text-xs text-slate-400 mt-6">
      FacturePro Africa · Gestion financière pour PME africaines
    </p>

  </div>
</div>
